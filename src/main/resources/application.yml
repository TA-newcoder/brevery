# ===================================================
# Bakery & Beverage System — Common Configuration
# ===================================================
spring:
  application:
    name: brevery
  profiles:
    active: dev

  # JPA Common
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Mail (dùng chung cả 2 profile)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp:
        auth: true
        starttls.enable: true

# JWT Config
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-testing-purposes-only-must-be-256-bits-long-at-minimum}
    access-expiration: 900000       # 15 phút
    refresh-expiration: 604800000   # 7 ngày
  cloudinary:
    cloud-name: ${CLOUDINARY_NAME:}
    api-key: ${CLOUDINARY_KEY:}
    api-secret: ${CLOUDINARY_SECRET:}
  ai:
    api-key: ${AI_API_KEY:}

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

---
# ===================================================
# Profile: DEV — H2 In-Memory (không cần SQL Server)
# ===================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:brevery;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  # Dev: tắt Redis — dùng simple cache
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: simple

  # Tắt Spring Boot Admin trong dev
  boot:
    admin:
      client:
        enabled: false

  # Tắt Spring AI Redis vector store trong dev
  ai:
    vectorstore:
      redis:
        initialize-schema: false

server:
  port: 8080

logging:
  level:
    com.brevery: DEBUG
    org.hibernate.SQL: DEBUG

---
# ===================================================
# Profile: PROD — SQL Server + Redis
# ===================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:brevery};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 30
      connection-timeout: 3000
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000

server:
  port: 8080

logging:
  level:
    root: WARN
    com.brevery: INFO
